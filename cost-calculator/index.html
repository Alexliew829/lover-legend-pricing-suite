<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>成本与售价计算器 - 情人传奇</title>
  <style>
    body {
  font-family: sans-serif;
  padding: 8px 15px;
      background-color: #f9f9f9;
      max-width: 800px;
      margin: auto;
      -webkit-text-size-adjust: 100%;
    }
    h1 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    h1 img { height: 40px; }
    p { text-align: center; color: #666; }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 4px 0;
      box-sizing: border-box;
      font-size: 16px;
    }
    label {
      font-weight: bold;
      font-size: 15px;
    }
    .result {
      margin-top: 12px;
      background: #fff;
      padding: 8px;
      border-radius: 6px;
      box-shadow: 0 0 8px rgba(0,0,0,0.05);
     
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      background: linear-gradient(to right, #7fbf7f, #4CAF50);
      color: white;
      border: none;
      margin-top: 8px;
      border-radius: 20px;
      cursor: pointer;
      touch-action: manipulation;
    }
    button:hover {
      background: linear-gradient(to right, #6dae6d, #3e9944);
    }

    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }

    .entry {
      font-size: 15px;
      margin: 4px 0;
      white-space: nowrap;
    }

    /* ✅ 小按钮：覆盖全局 button 样式 */
    .mini-btn{
      width: auto !important;
      padding: 4px 8px !important;
      font-size: 14px !important;
      border-radius: 10px !important;
      background: #333 !important;
      color: #fff !important;
      border: none !important;
      cursor: pointer !important;
      margin-top: 0 !important;
      line-height: 1 !important;
      white-space: nowrap !important;
      touch-action: manipulation !important;
    }
  </style>
</head>

<body>
  <h1>
    <img src="Logo2.jpg" alt="情人传奇 Logo" />
    <span>成本与售价计算器</span>
    <span style="font-size:16px; color:#666; font-weight:bold; margin-left:4px;">V2.3</span>
  </h1>
  <p style="color: red; font-weight: bold; font-size: 26px; letter-spacing: 1px;">
    – Lover Legend Gardening
  </p>

  <div class="row">
  <div style="flex:2;">
    <label for="price_display" style="display:flex; align-items:center; gap:8px;">
      <span>盆栽进口成本：</span>
      <button type="button" class="mini-btn" onclick="toggleCalc(true)">🧮</button>
    </label>

    <input
      id="price_display"
      onblur="formatDisplayPrice()"
      oninput="updateRawPrice()"
      type="text"
      placeholder="如 1,000.00"
    />
    <input id="price" type="hidden" value="" />
  </div>

  <div style="flex:0.8;">
    <label for="currency">货币：</label>
    <select id="currency" onchange="setRate()">
      <option selected value="CNY">CNY</option>
      <option value="NTD">NTD</option>
      <option value="VND">VND</option>
      <option value="IDR">IDR</option>
    </select>
  </div>

  <div style="flex:1;">
    <label for="rate">汇率：</label>
    <input id="rate" type="text" value="1.60" />
  </div>
</div>
<div class="row">
  <div>
    <label for="freight">海外到大马运费比例（%）：</label>
    <input id="freight" type="text" value="20%" />
  </div>

  <div>
    <label for="pot">花盆成本：</label>
    <input id="pot" type="text" value="0" />
  </div>
</div>

<div class="row">
  <div>
    <label for="moss">苔藓成本：</label>
    <input id="moss" type="text" value="0" />
  </div>

  <div>
    <label for="local">
      本地运费：
      <span style="color:#8B0000;font-weight:bold;">
        （钉木架80）
      </span>
    </label>
    <input id="local" type="text" value="20" />
  </div>
</div>
<div class="row" style="align-items:end; gap:5px;">
  <div style="flex:0.75;">
    <label for="actualPrice">实际售价：</label>
    <input
      id="actualPrice"
      type="text"
      value="0"
      onblur="formatActualPrice()"
    />
  </div>

  <div style="flex:0.75;">
    <label for="receivedDisplay">到手金额：</label>
    <input
      id="receivedDisplay"
      type="text"
      readonly
      value="0"
    />
  </div>

  <div style="flex:0.75;">
    <label for="actualNetProfitDisplay">净利：</label>
    <input
      id="actualNetProfitDisplay"
      type="text"
      readonly
      value="0"
    />
  </div>

  <div style="flex:0.65;">
    <label for="actualMarginDisplay">利润率：</label>
    <input
      id="actualMarginDisplay"
      type="text"
      readonly
      value="0"
    />
  </div>

  <div style="flex:0.75;">
    <button onclick="calculate()" style="margin-top:0;">
      🧮 计算
    </button>
  </div>
</div>
    <div class="result" id="result"></div>

  <!-- ✅ 小计算器弹窗 -->
  <div id="calcModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:9999; touch-action: manipulation;">
    <div id="calcBox" style="
      width:min(360px, 92vw);
      background:#fff;
      border-radius:14px;
      padding:12px;
      margin:12vh auto;
      box-shadow:0 10px 30px rgba(0,0,0,.2);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    ">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <strong style="font-size:16px;">🧮 计算机</strong>
        <button type="button" class="mini-btn" onclick="toggleCalc(false)" style="background:#777 !important;">关闭</button>
      </div>

      <!-- ✅ readonly + inputmode none：减少 iOS 双击放大 -->
      <input
        id="calcDisplay"
        type="text"
        readonly
        inputmode="none"
        placeholder="0"
        style="
          width:100%;
          font-size:22px;
          padding:10px;
          border:1px solid #ddd;
          border-radius:10px;
          box-sizing:border-box;
          margin-bottom:10px;
          touch-action: manipulation;
          -webkit-tap-highlight-color: transparent;
          user-select: none;
          -webkit-user-select: none;
        "
      />

      <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; touch-action: manipulation;">
        <button type="button" onclick="calcKey('7')">7</button>
        <button type="button" onclick="calcKey('8')">8</button>
        <button type="button" onclick="calcKey('9')">9</button>
        <button type="button" onclick="calcKey('/')">÷</button>

        <button type="button" onclick="calcKey('4')">4</button>
        <button type="button" onclick="calcKey('5')">5</button>
        <button type="button" onclick="calcKey('6')">6</button>
        <button type="button" onclick="calcKey('*')">×</button>

        <button type="button" onclick="calcKey('1')">1</button>
        <button type="button" onclick="calcKey('2')">2</button>
        <button type="button" onclick="calcKey('3')">3</button>
        <button type="button" onclick="calcKey('-')">−</button>

        <button type="button" onclick="calcKey('0')">0</button>
        <button type="button" onclick="calcKey('.')">.</button>
        <button type="button" onclick="calcBack()">⌫</button>
        <button type="button" onclick="calcKey('+')">+</button>

        <button type="button" onclick="calcKey('(')">(</button>
        <button type="button" onclick="calcKey(')')">)</button>
        <button type="button" onclick="calcKey('%')">%</button>
        <button type="button" onclick="calcClear()">C</button>

        <button type="button" onclick="calcEval()" style="grid-column: span 2; font-weight:bold;">=</button>
        <button type="button" onclick="fillImportCost()" style="grid-column: span 2; font-weight:bold;">填入成本</button>
      </div>

      <style>
        /* ✅ 只影响计算器里面的按钮 */
        #calcModal button{
          width:auto !important;
          padding:10px !important;
          font-size:16px !important;
          border-radius:10px !important;
          border:1px solid #ddd !important;
          background:#fafafa !important;
          color:#111 !important;
          cursor:pointer !important;
          margin-top:0 !important;
          touch-action: manipulation !important;
          -webkit-tap-highlight-color: transparent !important;
          user-select: none !important;
          -webkit-user-select: none !important;
        }
        #calcModal button:hover{ background:#f0f0f0 !important; }
        #calcModal button:active{ transform: scale(0.98); }
      </style>
    </div>
  </div>

  <script>
    const defaultRates = {
  CNY: 1.6,
  NTD: 7.69,
  VND: 6300.00,
  IDR: 3571.00
};
    const defaultFreight = {
      CNY: "20%",
      NTD: "20%",
      VND: "84.75%",
      IDR: "50%"
    };

    const defaultLocal = { CNY: 0, NTD: 20, VND: 20, IDR: 20 };

    // =======================
    // ✅ 计算器功能
    // =======================
    function toggleCalc(open) {
      const modal = document.getElementById('calcModal');
      modal.style.display = open ? 'block' : 'none';
    }

    function calcKey(k) {
      const d = document.getElementById('calcDisplay');
      d.value = (d.value || '') + k;
    }

    function calcClear() {
      document.getElementById('calcDisplay').value = '';
    }

    function calcBack() {
      const d = document.getElementById('calcDisplay');
      d.value = (d.value || '').slice(0, -1);
    }

    function calcEval() {
  const d = document.getElementById('calcDisplay');
  const expr = (d.value || '').trim();
  if (!expr) return;

  try {
    if (!/^[0-9+\-*/().\s%]+$/.test(expr)) {
      alert('只允许输入数字和 + - * / ( ) . %');
      return;
    }

    let safeExpr = expr;

    safeExpr = safeExpr.replace(
      /(\d+(?:\.\d+)?)\s*\+\s*(\d+(?:\.\d+)?)%/g,
      '($1+($1*$2/100))'
    );

    safeExpr = safeExpr.replace(
      /(\d+(?:\.\d+)?)\s*-\s*(\d+(?:\.\d+)?)%/g,
      '($1-($1*$2/100))'
    );

    safeExpr = safeExpr.replace(
      /(\d+(?:\.\d+)?)%/g,
      '($1/100)'
    );

    const result = Function('"use strict"; return (' + safeExpr + ')')();

    if (typeof result === 'number' && isFinite(result)) {
      d.value = Number(result.toFixed(6));
    } else {
      alert('计算结果无效');
    }
  } catch (e) {
    alert('表达式有误，请检查');
  }
}
    function fillImportCost() {
      const d = document.getElementById('calcDisplay');
      const val = parseFloat(d.value);
      if (isNaN(val)) {
        alert('请先算出一个数字结果');
        return;
      }
      const input = document.getElementById('price_display');
      input.value = String(val);
      formatDisplayPrice();
      toggleCalc(false);
    }

    // =======================
    // ✅ VND 花盆成本自动逻辑
    // =======================
    function autoSetPotVND() {
      const currency = document.getElementById('currency').value;
      const potInput = document.getElementById('pot');

      if (currency !== "VND") {
        potInput.value = "0";
        return;
      }

      const price = parseFloat(document.getElementById('price').value) || 0;

      if (price >= 4000000) {
        potInput.value = "105";
      } else if (price >= 1000000) {
        potInput.value = "55";
      } else {
        potInput.value = "35";
      }
    }

    function setRate() {
      const currency = document.getElementById('currency').value;
      document.getElementById('rate').value = defaultRates[currency].toFixed(6);
      document.getElementById('freight').value = defaultFreight[currency];
      document.getElementById('local').value = defaultLocal[currency];
      autoSetPotVND();
    }

    function autoDetectCurrency() {
      const raw = parseFloat(document.getElementById('price').value) || 0;
      const currency = document.getElementById('currency');
      const target = raw >= 100000 ? 'VND' : 'CNY';

      if (currency.value !== target) {
        currency.value = target;
        setRate();
      }
    }
function updateRawPrice() {
  const input = document.getElementById('price_display');
  const raw = parseFloat(input.value.replace(/,/g, '').replace(/[^\d.]/g, '')) || 0;
  document.getElementById('price').value = raw;

  document.getElementById('actualPrice').value = "0";
  document.getElementById('receivedDisplay').value = "0";
  document.getElementById('actualNetProfitDisplay').value = "0";
  document.getElementById('actualMarginDisplay').value = "0";

  autoSetPotVND();
  autoDetectCurrency();
}
    
    function formatDisplayPrice() {
      const input = document.getElementById('price_display');
      const raw = parseFloat(input.value.replace(/,/g, '').replace(/[^\d.]/g, ''));
      if (!isNaN(raw)) {
        const parts = raw.toFixed(2).split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        input.value = parts.join('.');
      }
      updateRawPrice();
    }
function formatActualPrice() {
  const input = document.getElementById('actualPrice');

  const value = parseFloat(
    input.value.replace(/,/g, '')
  );

  if (!isNaN(value)) {
    input.value = value.toFixed(2);
  }
}
    function calculate() {
      const price = parseFloat(document.getElementById('price').value);
      const freightInput = document.getElementById('freight').value.trim();
      const rate = parseFloat(document.getElementById('rate').value);
      const pot = parseFloat(document.getElementById('pot').value) || 0;
      const moss = parseFloat(document.getElementById('moss').value) || 0;
      const local = parseFloat(document.getElementById('local').value) || 0;
      const actualPrice =
  parseFloat(
    document.getElementById('actualPrice').value
      .replace(/,/g, '')
      .replace(/[^\d.]/g, '')
  ) || 0;
           if (isNaN(price) || isNaN(rate) || rate <= 0) {
        alert('请输入有效的进口成本单价和汇率');
        return;
      }

      const freight = freightInput === ""
        ? 0.2
        : freightInput.includes('%')
          ? (parseFloat(freightInput.replace('%', '')) / 100)
          : (parseFloat(freightInput) / 100);
const rmCost = (price / rate) * (1 + freight) + pot + moss + local;

let receivedAmount = 0;

if (actualPrice > 0) {
  // 实际售价 ≤ RM500 扣 RM50；超过 RM500 扣 RM80
  const deliveryCost = actualPrice <= 500 ? 50 : 80;

  // 到手金额 = 实际售价 - 10%佣金 - 运费
  receivedAmount = actualPrice * 0.9 - deliveryCost;

  // 实际净利 = 到手金额 - 实际成本
  const actualNetProfit = receivedAmount - rmCost;

  // 利润率 = 实际净利 ÷ 实际售价 × 100%
  const actualMargin = (actualNetProfit / actualPrice) * 100;

  document.getElementById('receivedDisplay').value = receivedAmount.toFixed(2);
  document.getElementById('actualNetProfitDisplay').value = actualNetProfit.toFixed(2);
  document.getElementById('actualMarginDisplay').value = actualMargin.toFixed(2) + "%";
} else {
  document.getElementById('receivedDisplay').value = "0";
  document.getElementById('actualNetProfitDisplay').value = "0";
  document.getElementById('actualMarginDisplay').value = "0";
}
                const prices = {
        "20%": rmCost * 1.26 * 1.12,
        "30%": rmCost * 1.43 * 1.12,
        "40%": rmCost * 1.67 * 1.12,
        "45%": rmCost * 1.82 * 1.12,
        "50%": rmCost * 2.00 * 1.12,
        "55%": rmCost * 2.23 * 1.12,
        "60%": rmCost * 2.51 * 1.12
      };

     const costX3 = rmCost * 3;
      let html = `<div class="entry" style="font-size:20px;">
  <strong>实际成本：</strong>RM ${rmCost.toFixed(2)}
  <span style="color:#8B0000; font-weight:bold;">
    &nbsp;&nbsp;x3: RM ${costX3.toFixed(2)}
  </span>
</div>`;

      html += `<div class="entry" style="font-size: 20px;"><strong>20% 批发售价：</strong>RM ${prices["20%"].toFixed(2)}</div>`;
      html += `<div class="entry" style="font-size: 20px; color: #0d47a1; font-weight: bold;"><strong>30% 利润售价：</strong>RM ${prices["30%"].toFixed(2)}</div>`;
      html += `<div class="entry" style="font-size: 20px;"><strong>40% 利润售价：</strong>RM ${prices["40%"].toFixed(2)}</div>`;
     const price45Raw = prices["45%"];
const price45 =
  Math.floor(price45Raw / 100) * 100 + 80;

html += `<div class="entry" style="font-size:20px; color:#0d47a1; font-weight:bold;">
  <strong>45% 利润售价：</strong>RM ${price45.toFixed(2)}
</div>`;
      const retail50Raw = prices["50%"];
const retail50 =
  Math.floor(retail50Raw / 100) * 100 + 80;

const streamerPrice = retail50;

// 扣 10% 佣金
const afterCommission = streamerPrice * 0.9;

// 售价 ≤500 扣 RM50，>500 扣 RM80
const deliveryCost = streamerPrice <= 500 ? 50 : 80;

// 直播净利
const profitAfterCommission =
  afterCommission - deliveryCost - rmCost;

// 利润率
const marginPercent =
  (profitAfterCommission / streamerPrice) * 100;

html += `
<div class="entry" style="font-size:20px; color:red; font-weight:bold;">
  <strong>50% 门市/直播售价：</strong>RM ${retail50.toFixed(2)}
</div>
<div class="entry" style="font-size:18px; color:#000; font-weight:900;">
  （直播净利：RM ${profitAfterCommission.toFixed(2)}
  ｜利润率：${marginPercent.toFixed(2)}%）
</div>
`;
      const price55Raw = prices["55%"];

const price55 =
  Math.floor(price55Raw / 100) * 100 + 80;

html += `<div class="entry" style="font-size:20px; color:#0d47a1; font-weight:bold;">
  <strong>55% 利润售价：</strong>RM ${price55.toFixed(2)}
</div>`;
     const price60Raw = prices["60%"];

const price60 =
  Math.floor(price60Raw / 100) * 100 + 80;
const price60Discount = price60 * 0.75 / 2;
      html += `<div class="entry" style="font-size: 20px; color: red; font-weight: bold;">
        <strong>60% Fair售价：</strong>RM ${price60.toFixed(2)}
        <span style="color: #0d47a1; font-weight: bold; font-size: 20px;"> / ${price60Discount.toFixed(2)}</span>
      </div>`;

      html += `<div class="entry" style="font-size: 20px; font-weight: bold; color: #000;">
        （门市最多 -10% ，Fair 最多 -25%）
      </div>`;

      document.getElementById('result').innerHTML = html;
    }
document.addEventListener('keydown', function(e) {
  const modal = document.getElementById('calcModal');
  const d = document.getElementById('calcDisplay');

  if (modal.style.display !== 'block') return;

  if (e.ctrlKey || e.metaKey || e.altKey) {
    if (e.key.toLowerCase() === 'a') {
      e.preventDefault();
      d.focus();
      d.select();
    }
    return;
  }

  if (/^[0-9]$/.test(e.key) || ['+','-','*','/','.','%','(',')'].includes(e.key)) {
    e.preventDefault();

    if (d.selectionStart !== d.selectionEnd) {
      d.value =
        d.value.slice(0, d.selectionStart) +
        e.key +
        d.value.slice(d.selectionEnd);
    } else {
      calcKey(e.key);
    }
  }

  if (e.key === 'Backspace') {
    e.preventDefault();

    if (d.selectionStart !== d.selectionEnd) {
      d.value =
        d.value.slice(0, d.selectionStart) +
        d.value.slice(d.selectionEnd);
    } else {
      calcBack();
    }
  }

  if (e.key === 'Delete') {
    e.preventDefault();

    if (d.selectionStart !== d.selectionEnd) {
      d.value =
        d.value.slice(0, d.selectionStart) +
        d.value.slice(d.selectionEnd);
    } else {
      calcClear();
    }
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    calcEval();
  }

  if (e.key === 'Escape') {
    e.preventDefault();
    toggleCalc(false);
  }
});
    window.onload = () => {
  setRate();
  autoSetPotVND();
  autoDetectCurrency();
};
  </script>
</body>
</html>
