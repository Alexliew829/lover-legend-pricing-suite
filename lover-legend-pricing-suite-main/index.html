<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Lover Legend Calculators</title>
  <link rel="icon" href="bonsai-price-calculator/images/icon-192.png" />
  <link rel="apple-touch-icon" href="bonsai-price-calculator/images/apple-touch-icon.png" />
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #eef2ec;
      font-family: Arial, "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .page {
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
      padding: 10px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(720px, 1.65fr) minmax(430px, 0.95fr);
      gap: 12px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      overflow: hidden;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    iframe {
      display: block;
      width: 100%;
      min-height: 820px;
      border: 0;
      background: #fff;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 1fr;
      }

      iframe {
        min-height: 780px;
      }
    }

    @media (max-width: 600px) {
      .page { padding: 0; }
      .layout { gap: 8px; }
      .panel {
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="layout">
      <section class="panel" aria-label="成本与售价计算器">
        <iframe
          id="costFrame"
          src="cost-calculator/index.html"
          title="成本与售价计算器"
          loading="eager"
        ></iframe>
      </section>

      <section class="panel" aria-label="盆景价格计算器">
        <iframe
          id="priceFrame"
          src="bonsai-price-calculator/index.html"
          title="盆景价格计算器"
          loading="eager"
        ></iframe>
      </section>
    </div>
  </main>

  <script>
    function fitFrame(frame) {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        const height = Math.max(
          doc.documentElement.scrollHeight,
          doc.body ? doc.body.scrollHeight : 0
        );
        if (height > 0) frame.style.height = `${height + 8}px`;
      } catch (error) {
        // Same-origin GitHub Pages normally allows automatic height adjustment.
      }
    }

    document.querySelectorAll("iframe").forEach((frame) => {
      frame.addEventListener("load", () => {
        fitFrame(frame);
        setTimeout(() => fitFrame(frame), 300);
        setTimeout(() => fitFrame(frame), 1000);
      });
    });

    window.addEventListener("resize", () => {
      document.querySelectorAll("iframe").forEach(fitFrame);
    });
  </script>
</body>
</html>
