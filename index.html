<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="theme-color" content="#eef2ec" />
  <title>Lover Legend Pricing Suite</title>
  <link rel="icon" href="bonsai-price-calculator/images/icon-192.png" />
  <link rel="apple-touch-icon" href="bonsai-price-calculator/images/apple-touch-icon.png" />
<style>
    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #eef2ec;
      font-family: Arial, "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .page {
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
      padding: 10px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(720px, 1.65fr) minmax(430px, 0.95fr);
      gap: 12px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      overflow: hidden;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    iframe {
      display: block;
      width: 100%;
      height: 1px;
      min-height: 0;
      border: 0;
      background: #fff;
      overflow: hidden;
    }

    .mobile-divider {
      display: none;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 0;
      }

      .layout {
        gap: 0;
      }

      .panel {
        border-radius: 0;
        box-shadow: none;
      }

      .mobile-divider {
        display: block;
        width: 100%;
        height: 0;
        border-top: 3px dashed #d60000;
        margin: 8px 0;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="layout">
      <section class="panel" aria-label="成本与售价计算器">
        <iframe
          id="costFrame"
          src="cost-calculator/index.html"
          title="成本与售价计算器"
          loading="eager"
          scrolling="no"
        ></iframe>
      </section>

      <div class="mobile-divider" aria-hidden="true"></div>

      <section class="panel" aria-label="盆景价格计算器">
        <iframe
          id="priceFrame"
          src="bonsai-price-calculator/index.html"
          title="盆景价格计算器"
          loading="eager"
          scrolling="no"
        ></iframe>
      </section>
    </div>
  </main>

  <script>
    const frameObservers = new WeakMap();

    function prepareFrame(frame) {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc || !doc.head) return;

        if (!doc.getElementById("pricing-suite-layout-fix")) {
          const style = doc.createElement("style");
          style.id = "pricing-suite-layout-fix";
          style.textContent = `
            html, body { min-height: 0 !important; }
            .app { min-height: 0 !important; }
          `;
          doc.head.appendChild(style);
        }
      } catch (error) {
        // 同源页面正常情况下可读取；失败时保留子页面原状。
      }
    }

    function getDocumentHeight(doc) {
      const body = doc.body;
      const html = doc.documentElement;

      return Math.max(
        body ? body.scrollHeight : 0,
        body ? body.offsetHeight : 0,
        body ? body.getBoundingClientRect().height : 0,
        html ? html.scrollHeight : 0,
        html ? html.offsetHeight : 0,
        html ? html.getBoundingClientRect().height : 0
      );
    }

    function fitFrame(frame) {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc || !doc.documentElement) return;

        prepareFrame(frame);
        frame.style.height = "1px";

        requestAnimationFrame(() => {
          const height = getDocumentHeight(doc);
          if (height > 0) {
            frame.style.height = `${Math.ceil(height) + 2}px`;
          }
        });
      } catch (error) {
        // 同源 GitHub Pages 正常情况下可以自动调整。
      }
    }

    function watchFrame(frame) {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc || !doc.body) return;

        const oldObserver = frameObservers.get(frame);
        if (oldObserver) oldObserver.disconnect();

        const observer = new ResizeObserver(() => fitFrame(frame));
        observer.observe(doc.documentElement);
        observer.observe(doc.body);
        frameObservers.set(frame, observer);
      } catch (error) {
        // 忽略无法读取 iframe 的情况。
      }
    }

    document.querySelectorAll("iframe").forEach((frame) => {
      frame.addEventListener("load", () => {
        prepareFrame(frame);
        fitFrame(frame);
        watchFrame(frame);
        setTimeout(() => fitFrame(frame), 150);
        setTimeout(() => fitFrame(frame), 500);
        setTimeout(() => fitFrame(frame), 1200);
      });
    });

    let resizeTimer;

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        document.querySelectorAll("iframe").forEach(fitFrame);
      }, 120);
    });

    let appWasHidden = false;
    let freshReloadStarted = false;

    function reloadFreshPage() {
      if (freshReloadStarted) return;
      freshReloadStarted = true;

      const url = new URL(window.location.href);
      url.searchParams.set("_fresh", Date.now().toString());
      window.location.replace(url.toString());
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") {
        appWasHidden = true;
        return;
      }

      if (document.visibilityState === "visible" && appWasHidden) {
        appWasHidden = false;
        reloadFreshPage();
      }
    });

    window.addEventListener("pageshow", event => {
      if (event.persisted) {
        reloadFreshPage();
      }
    });

    // 清除合并版曾经注册的 Service Worker 和缓存。
    // 这不会修改两个计算器的公式或计算逻辑。
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(registration => registration.unregister()));
        } catch (error) {
          // 清除失败时不影响计算器正常使用。
        }

        if ("caches" in window) {
          try {
            const keys = await caches.keys();
            await Promise.all(
              keys
                .filter(key => key.startsWith("lover-legend-pricing-suite"))
                .map(key => caches.delete(key))
            );
          } catch (error) {
            // 清除失败时不影响计算器正常使用。
          }
        }
      });
    }
  </script>
</body>
</html>
