<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="theme-color" content="#eef2ec" />
  <title>Lover Legend Pricing Suite</title>
  <link rel="icon" href="bonsai-price-calculator/images/icon-192.png" />
  <link rel="apple-touch-icon" href="bonsai-price-calculator/images/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />

  <style>
    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #eef2ec;
      font-family: Arial, "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .page {
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
      padding: 10px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(720px, 1.65fr) minmax(430px, 0.95fr);
      gap: 12px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      overflow: hidden;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    iframe {
      display: block;
      width: 100%;
      height: 1px;
      min-height: 0;
      border: 0;
      background: #fff;
      overflow: hidden;
    }

    .mobile-divider {
      display: none;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }

    @media (max-width: 600px) {
      .page {
        padding: 0;
      }

      .layout {
        gap: 0;
      }

      .panel {
        border-radius: 0;
        box-shadow: none;
      }

      .mobile-divider {
        display: block;
        width: 100%;
        height: 0;
        border-top: 3px dashed #d60000;
        margin: 8px 0;
      }
    }
  
    .pull-refresh-indicator {
      position: fixed;
      top: 10px;
      left: 50%;
      z-index: 99999;
      min-width: 150px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(20, 20, 20, 0.88);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -18px);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .pull-refresh-indicator.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (min-width: 601px) {
      .pull-refresh-indicator {
        display: none;
      }
    }

  </style>
</head>

<body>
  <div id="pullRefreshIndicator" class="pull-refresh-indicator">↓ 下拉刷新</div>
  <main class="page">
    <div class="layout">
      <section class="panel" aria-label="成本与售价计算器">
        <iframe
          id="costFrame"
          src="cost-calculator/index.html"
          title="成本与售价计算器"
          loading="eager"
          scrolling="no"
        ></iframe>
      </section>

      <div class="mobile-divider" aria-hidden="true"></div>

      <section class="panel" aria-label="盆景价格计算器">
        <iframe
          id="priceFrame"
          src="bonsai-price-calculator/index.html"
          title="盆景价格计算器"
          loading="eager"
          scrolling="no"
        ></iframe>
      </section>
    </div>
  </main>

  <script>
    const frameObservers = new WeakMap();

    function prepareFrame(frame) {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc || !doc.head) return;

        if (!doc.getElementById("pricing-suite-layout-fix")) {
          const style = doc.createElement("style");
          style.id = "pricing-suite-layout-fix";
          style.textContent = `
            html, body { min-height: 0 !important; }
            .app { min-height: 0 !important; }
          `;
          doc.head.appendChild(style);
        }
      } catch (error) {
        // 同源页面正常情况下可读取；失败时保留子页面原状。
      }
    }

    function getDocumentHeight(doc) {
      const body = doc.body;
      const html = doc.documentElement;

      return Math.max(
        body ? body.scrollHeight : 0,
        body ? body.offsetHeight : 0,
        body ? body.getBoundingClientRect().height : 0,
        html ? html.scrollHeight : 0,
        html ? html.offsetHeight : 0,
        html ? html.getBoundingClientRect().height : 0
      );
    }

    function fitFrame(frame) {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc || !doc.documentElement) return;

        prepareFrame(frame);
        frame.style.height = "1px";

        requestAnimationFrame(() => {
          const height = getDocumentHeight(doc);
          if (height > 0) {
            frame.style.height = `${Math.ceil(height) + 2}px`;
          }
        });
      } catch (error) {
        // 同源 GitHub Pages 正常情况下可以自动调整。
      }
    }

    function watchFrame(frame) {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        if (!doc || !doc.body) return;

        const oldObserver = frameObservers.get(frame);
        if (oldObserver) oldObserver.disconnect();

        const observer = new ResizeObserver(() => fitFrame(frame));
        observer.observe(doc.documentElement);
        observer.observe(doc.body);
        frameObservers.set(frame, observer);
      } catch (error) {
        // 忽略无法读取 iframe 的情况。
      }
    }

    let pendingFairPrice = null;
    let fairPriceObserver = null;

    function extractFairPriceFromCostCalculator() {
      try {
        const costFrame = document.getElementById("costFrame");
        const costDoc =
          costFrame.contentDocument || costFrame.contentWindow.document;
        const result = costDoc.getElementById("result");

        if (!result) return null;

        const text = result.textContent || "";
        const match = text.match(
          /60%\s*Fair\s*售价\s*[：:]\s*RM\s*([\d,]+(?:\.\d+)?)/i
        );

        if (!match) return null;

        const value = Number(match[1].replace(/,/g, ""));
        if (!Number.isFinite(value)) return null;

        return Math.round(value);
      } catch (error) {
        return null;
      }
    }

    function applyFairPriceToBonsaiCalculator(price) {
      if (!Number.isFinite(price)) return false;

      try {
        const priceFrame = document.getElementById("priceFrame");
        const priceDoc =
          priceFrame.contentDocument || priceFrame.contentWindow.document;
        const retailInput = priceDoc.getElementById("retailPrice");

       if (!retailInput) return false;
       retailInput.value = Number(price).toFixed(2);
       retailInput.dispatchEvent(new Event("input", { bubbles: true }));
       retailInput.dispatchEvent(new Event("change", { bubbles: true }));
        
       return true;
      } catch (error) {
        return false;
      }
    }

    function syncFairPriceToBonsaiCalculator() {
      const fairPrice = extractFairPriceFromCostCalculator();
      if (!Number.isFinite(fairPrice)) return;

      pendingFairPrice = fairPrice;

      if (applyFairPriceToBonsaiCalculator(fairPrice)) {
        pendingFairPrice = null;
      }
    }

    function watchFairPriceResult() {
      try {
        const costFrame = document.getElementById("costFrame");
        const costDoc =
          costFrame.contentDocument || costFrame.contentWindow.document;
        const result = costDoc.getElementById("result");

        if (!result) return;

        if (fairPriceObserver) {
          fairPriceObserver.disconnect();
        }

        fairPriceObserver = new MutationObserver(() => {
          syncFairPriceToBonsaiCalculator();
        });

        fairPriceObserver.observe(result, {
          childList: true,
          subtree: true,
          characterData: true
        });

        syncFairPriceToBonsaiCalculator();
      } catch (error) {
        // 同源页面正常情况下可以读取；失败时不影响两个计算器。
      }
    }

    document.querySelectorAll("iframe").forEach((frame) => {
      frame.addEventListener("load", () => {
        prepareFrame(frame);
        fitFrame(frame);
        watchFrame(frame);

        if (frame.id === "costFrame") {
          watchFairPriceResult();
        }

        if (
          frame.id === "priceFrame" &&
          Number.isFinite(pendingFairPrice)
        ) {
          if (applyFairPriceToBonsaiCalculator(pendingFairPrice)) {
            pendingFairPrice = null;
          }
        }

        setTimeout(() => fitFrame(frame), 150);
        setTimeout(() => fitFrame(frame), 500);
        setTimeout(() => fitFrame(frame), 1200);
      });
    });

    let resizeTimer;

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        document.querySelectorAll("iframe").forEach(fitFrame);
      }, 120);
    });


    const isMobileDevice =
      /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
      (navigator.maxTouchPoints > 1 && window.matchMedia("(pointer: coarse)").matches);

    const pullRefreshIndicator = document.getElementById("pullRefreshIndicator");
    const pullThreshold = 90;
    let pullStartY = 0;
    let pullDistance = 0;
    let pullTracking = false;
    let pullRefreshing = false;

    function showPullIndicator(distance) {
      if (!pullRefreshIndicator) return;

      pullRefreshIndicator.classList.add("show");
      pullRefreshIndicator.textContent =
        distance >= pullThreshold ? "松开刷新" : "↓ 下拉刷新";
    }

    function hidePullIndicator() {
      if (!pullRefreshIndicator) return;
      pullRefreshIndicator.classList.remove("show");
      pullRefreshIndicator.textContent = "↓ 下拉刷新";
    }

    function runPullRefresh() {
      if (pullRefreshing) return;
      pullRefreshing = true;

      if (pullRefreshIndicator) {
        pullRefreshIndicator.classList.add("show");
        pullRefreshIndicator.textContent = "正在刷新…";
      }

      const url = new URL(window.location.href);
      url.searchParams.set("_refresh", Date.now().toString());
      window.location.replace(url.toString());
    }

    function handlePullStart(event) {
      if (!isMobileDevice || pullRefreshing || window.scrollY > 0) return;
      if (!event.touches || event.touches.length !== 1) return;

      pullStartY = event.touches[0].clientY;
      pullDistance = 0;
      pullTracking = true;
    }

    function handlePullMove(event) {
      if (!pullTracking || !event.touches || event.touches.length !== 1) return;

      const currentY = event.touches[0].clientY;
      pullDistance = Math.max(0, currentY - pullStartY);

      if (pullDistance <= 0) {
        hidePullIndicator();
        return;
      }

      showPullIndicator(pullDistance);

      // 到达页面顶部后向下拉时，阻止 iOS 自己的橡皮筋滚动。
      if (event.cancelable) {
        event.preventDefault();
      }
    }

    function handlePullEnd() {
      if (!pullTracking) return;

      const shouldRefresh = pullDistance >= pullThreshold;
      pullTracking = false;
      pullDistance = 0;

      if (shouldRefresh) {
        runPullRefresh();
      } else {
        hidePullIndicator();
      }
    }

    function attachPullToRefresh(targetDocument) {
      if (!isMobileDevice || !targetDocument) return;
      if (targetDocument.__pricingSuitePullRefreshAttached) return;

      targetDocument.__pricingSuitePullRefreshAttached = true;
      targetDocument.addEventListener("touchstart", handlePullStart, { passive: true });
      targetDocument.addEventListener("touchmove", handlePullMove, { passive: false });
      targetDocument.addEventListener("touchend", handlePullEnd, { passive: true });
      targetDocument.addEventListener("touchcancel", handlePullEnd, { passive: true });
    }

    attachPullToRefresh(document);

    document.querySelectorAll("iframe").forEach(frame => {
      frame.addEventListener("load", () => {
        try {
          const doc = frame.contentDocument || frame.contentWindow.document;
          attachPullToRefresh(doc);
        } catch (error) {
          // 同源页面正常情况下可以绑定；失败时不影响计算器。
        }
      });
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
